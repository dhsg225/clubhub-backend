apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: clubhub-dev
resources:
  - ../../base
  - ../../services/cms-api
  - ../../services/api-gateway
  - ../../services/replay-service
  - ../../services/entropy-service

patches:
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: cms-api
        namespace: clubhub-dev
      spec:
        replicas: 1
    target:
      kind: Deployment
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: api-gateway
        namespace: clubhub-dev
      spec:
        replicas: 1
    target:
      kind: Deployment
      name: api-gateway
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: replay-service
        namespace: clubhub-dev
      spec:
        replicas: 1
    target:
      kind: Deployment
      name: replay-service
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: entropy-service
        namespace: clubhub-dev
      spec:
        replicas: 1
    target:
      kind: Deployment
      name: entropy-service

commonLabels:
  environment: dev
