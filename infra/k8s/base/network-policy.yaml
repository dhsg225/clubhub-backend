# Default deny all ingress/egress — services must explicitly allow
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: clubhub
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Allow internal service communication within namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-internal
  namespace: clubhub
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: clubhub
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: clubhub
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: clubhub
    # Allow DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow external HTTPS (corpus CDN, telemetry)
    - ports:
        - port: 443
          protocol: TCP
