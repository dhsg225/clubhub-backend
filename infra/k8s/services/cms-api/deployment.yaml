apiVersion: apps/v1
kind: Deployment
metadata:
  name: cms-api
  namespace: clubhub
  labels:
    app: cms-api
    app.kubernetes.io/part-of: clubhub
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cms-api
  template:
    metadata:
      labels:
        app: cms-api
        app.kubernetes.io/part-of: clubhub
    spec:
      containers:
        - name: cms-api
          image: clubhub/cms-api:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: clubhub-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: clubhub-secrets
                  key: REDIS_URL
          envFrom:
            - configMapRef:
                name: clubhub-config
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      terminationGracePeriodSeconds: 30
