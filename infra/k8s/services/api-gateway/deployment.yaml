apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: clubhub
  labels:
    app: api-gateway
    app.kubernetes.io/part-of: clubhub
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        app.kubernetes.io/part-of: clubhub
    spec:
      containers:
        - name: api-gateway
          image: clubhub/api-gateway:latest
          ports:
            - containerPort: 4000
          env:
            - name: NODE_ENV
              value: "production"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: clubhub-secrets
                  key: REDIS_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: clubhub-secrets
                  key: JWT_SECRET
          envFrom:
            - configMapRef:
                name: clubhub-config
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
      terminationGracePeriodSeconds: 30
