apiVersion: apps/v1
kind: Deployment
metadata:
  name: pre-runtime
  namespace: clubhub
  labels:
    app: pre-runtime
    app.kubernetes.io/part-of: clubhub
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pre-runtime
  template:
    metadata:
      labels:
        app: pre-runtime
        app.kubernetes.io/part-of: clubhub
    spec:
      containers:
        - name: pre-runtime
          image: clubhub/pre-runtime:latest
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: clubhub-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: clubhub-secrets
                  key: REDIS_URL
            - name: CORPUS_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: clubhub-secrets
                  key: CORPUS_SIGNING_KEY
          envFrom:
            - configMapRef:
                name: clubhub-config
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      terminationGracePeriodSeconds: 30
