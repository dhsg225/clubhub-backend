name: Chaos Smoke — Constitutional Invariants Under Failure

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  chaos-smoke:
    name: Stage 08 — Chaos Smoke (270 assertions, 10 invariants)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run chaos smoke test (Stage 08)
        run: npx tsx ci/stages/08-chaos-smoke.yml --run 2>/dev/null || npx tsx scripts/chaos/chaos-smoke.ts
