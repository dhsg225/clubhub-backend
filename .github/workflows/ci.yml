name: CI — Build, Typecheck, Lint, Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript — No Errors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo typecheck
        name: Typecheck all packages

  constitutional-check:
    name: Constitutional Contract Check (FP-01–25)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm constitutional:check
        name: Validate all constitutional contracts (FP-01–25)
      - run: pnpm constitutional:boundary
        name: Verify PRE boundary (no telemetry-sdk in pre-engine)

  migration-lint:
    name: Migration Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: npx tsx ci/scripts/migration-lint.ts
        name: Lint migration files (partitioning, append-only, RLS)

  build:
    name: Build All Packages
    runs-on: ubuntu-latest
    needs: [typecheck, constitutional-check]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo build
      - uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            packages/*/dist
            services/*/dist
          retention-days: 7

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo test
        continue-on-error: false

  replay-determinism:
    name: Replay Determinism (1000 invocations → single checksum)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: npx tsx scripts/validation/deterministic-load.ts
        name: 1000-invocation determinism check

  vector-assertions:
    name: All Vector Assertions
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: npx tsx scripts/vectors/runtime-integration.vec.ts
        name: Runtime integration vectors (150)
      - run: npx tsx scripts/vectors/shadow.vec.ts
        name: Shadow parity vectors (141)
      - run: npx tsx scripts/vectors/hardening.vec.ts
        name: Production hardening vectors (119)
