;; PgBouncer — ClubHub TV Production
;; Pool mode: transaction (connections released after each query, not each session)
;; This is required because the app uses node-postgres Pool which holds connections.
;;
;; Max server connections: 40 (leaves headroom on RDS db.t3.medium = 170 max)
;; Max client connections: 200 (node-postgres pool max=10 × 20 pod instances)

[databases]
;; Route all connections for "clubhub" to postgres backend
;; DB_HOST / DB_PORT injected by entrypoint.sh from env
clubhub = host=%DB_HOST% port=%DB_PORT% dbname=clubhub

[pgbouncer]
;; Listen on all interfaces inside Docker internal network
listen_addr = 0.0.0.0
listen_port = 5432

;; Authentication
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

;; Pool settings — transaction mode is correct for connection-pooling with node-postgres
pool_mode = transaction

;; Per-database/user limits
max_client_conn = 200
default_pool_size = 20
min_pool_size = 2
reserve_pool_size = 5
reserve_pool_timeout = 3

;; Server connection lifetime — recycle connections to avoid stale state
server_lifetime = 3600
server_idle_timeout = 600
server_connect_timeout = 10
server_login_retry = 5

;; Client connection limits
client_idle_timeout = 0
client_login_timeout = 10

;; Query timeout — kill queries running > 30s (protects against runaway audit writes)
query_timeout = 30
query_wait_timeout = 10

;; Logging
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60

;; Admin console (accessible on port 6432 from internal network only)
admin_users = pgbouncer_admin
stats_users = pgbouncer_stats

;; TLS — terminate at Caddy; internal network is trusted
server_tls_sslmode = disable
client_tls_sslmode = disable

;; Process
pidfile = /var/run/pgbouncer/pgbouncer.pid
logfile = /var/log/pgbouncer/pgbouncer.log
