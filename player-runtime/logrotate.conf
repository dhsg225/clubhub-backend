# ClubHub TV Player — log rotation
# Install: cp logrotate.conf /etc/logrotate.d/clubhub-player
# Rotates PM2/systemd journal redirected logs at /var/log/clubhub/
#
# Design constraints:
#   - SD card endurance: total log write must be < 50MB/day
#   - Retain 7 days for support investigation window
#   - Compressed rotation reduces SD card space by ~90%
#   - nocreate: log files owned by player service, not root
#
# FAILURE MODEL: if logrotate fails (cron dead), logs grow unbounded.
# Watchdog disk-space check fires at 150MB free — operator alerted before
# disk fills. Manual recovery: truncate log files, restart logrotate cron.

/var/log/clubhub/player.log {
    daily
    rotate 7
    maxsize 10M
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    dateext
    dateformat -%Y%m%d
}

/var/log/clubhub/watchdog.log {
    daily
    rotate 7
    maxsize 5M
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
}

/var/log/clubhub/corpus-sync.log {
    daily
    rotate 7
    maxsize 5M
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
}
