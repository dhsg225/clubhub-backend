name: 09 — Preview Verification

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  preview-verification:
    name: Preview Vector Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run preview vector tests
        run: npx ts-node scripts/vectors/preview.vec.ts

      - name: Upload preview test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preview-output
          path: |
            scripts/vectors/preview.vec.ts
            src/preview/
          retention-days: 7
